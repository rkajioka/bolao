name: Deploy Produção

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_DIR="/var/www/bolao"
            PYTHON="$APP_DIR/.venv/bin/python"
            PIP="$APP_DIR/.venv/bin/pip"

            cd "$APP_DIR"

            export PATH="/usr/local/bin:/usr/bin:$PATH"
            if [ -f "$HOME/.nvm/nvm.sh" ]; then
              . "$HOME/.nvm/nvm.sh"
            fi

            echo "→ Preflight..."
            command -v python3 >/dev/null || { echo "FALHA: python3 ausente"; exit 1; }
            if ! command -v npm >/dev/null; then
              echo "→ npm ausente — instalando Node.js 20 (NodeSource)..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            command -v npm >/dev/null || { echo "FALHA: npm ainda ausente após instalação"; exit 1; }

            echo "→ Atualizando código..."
            git fetch origin main
            git reset --hard origin/main

            echo "→ Sincronizando unit systemd..."
            sudo cp "$APP_DIR/bolao.service" /etc/systemd/system/bolao.service
            sudo systemctl daemon-reload

            echo "→ Garantindo venv Python..."
            if ! "$PYTHON" -c "import sys" >/dev/null 2>&1; then
              echo "  venv ausente ou quebrado — recriando"
              rm -rf "$APP_DIR/.venv"
              python3 -m venv "$APP_DIR/.venv"
            fi
            "$PIP" install -r "$APP_DIR/requirements.txt"

            echo "→ Buildando frontend..."
            ( cd "$APP_DIR/frontend" && npm ci && npm run build )

            echo "→ Rodando migrations..."
            "$PYTHON" -m alembic upgrade head

            echo "→ Reiniciando serviço..."
            sudo systemctl restart bolao

            echo "→ Verificação local pós-restart..."
            sleep 2
            systemctl is-active --quiet bolao || { echo "FALHA: bolao não está active"; exit 1; }

            echo "✅ Deploy concluído!"
