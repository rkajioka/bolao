name: Deploy Producao

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          debug: true
          script: |
            set -eo pipefail
            APP_DIR="/var/www/bolao"
            PYTHON="$APP_DIR/.venv/bin/python"
            PIP="$APP_DIR/.venv/bin/pip"

            echo "Conectado como $(whoami); pwd=$(pwd)"
            if [ ! -d "$APP_DIR" ]; then
              echo "FALHA: diretorio $APP_DIR nao existe"
              exit 1
            fi
            cd "$APP_DIR"

            export PATH="/usr/local/bin:/usr/bin:$PATH"
            if [ -f "$HOME/.nvm/nvm.sh" ]; then
              . "$HOME/.nvm/nvm.sh"
            fi

            echo "-> Preflight..."
            command -v python3 >/dev/null || { echo "FALHA: python3 ausente"; exit 1; }
            if ! command -v npm >/dev/null; then
              echo "-> npm ausente - instalando Node.js 20 (NodeSource)..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            command -v npm >/dev/null || { echo "FALHA: npm ainda ausente apos instalacao"; exit 1; }

            echo "-> Atualizando codigo..."
            git fetch origin main
            git reset --hard origin/main

            echo "-> Sincronizando unit systemd..."
            sudo cp "$APP_DIR/bolao.service" /etc/systemd/system/bolao.service
            sudo systemctl daemon-reload

            echo "-> Garantindo venv Python..."
            if ! "$PYTHON" -c "import sys" >/dev/null 2>&1; then
              echo "  venv ausente ou quebrado - recriando"
              rm -rf "$APP_DIR/.venv"
              python3 -m venv "$APP_DIR/.venv"
            fi
            "$PIP" install -r "$APP_DIR/requirements.txt"

            echo "-> Buildando frontend..."
            ( cd "$APP_DIR/frontend" && npm ci && npm run build )

            echo "-> Rodando migrations..."
            "$PYTHON" -m alembic upgrade head

            echo "-> Reiniciando servico..."
            sudo systemctl restart bolao

            echo "-> Verificacao local pos-restart..."
            sleep 2
            systemctl is-active --quiet bolao || { echo "FALHA: bolao nao esta active"; exit 1; }

            echo "OK: Deploy concluido!"
