name: Deploy Producao

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -eo pipefail
            APP_DIR="/var/www/bolao"
            PYTHON="$APP_DIR/.venv/bin/python"
            PIP="$APP_DIR/.venv/bin/pip"

            echo "Conectado como $(whoami); pwd=$(pwd)"
            if [ ! -d "$APP_DIR" ]; then
              echo "FALHA: diretorio $APP_DIR nao existe"
              exit 1
            fi
            cd "$APP_DIR"

            export PATH="/usr/local/bin:/usr/bin:$PATH"
            if [ -f "$HOME/.nvm/nvm.sh" ]; then
              . "$HOME/.nvm/nvm.sh"
            fi

            echo "-> Preflight sudo (SSH nao tem TTY)..."
            DEPLOY_USER="$(whoami)"
            SYSTEMCTL="$(command -v systemctl)"
            if ! sudo -n "$SYSTEMCTL" daemon-reload 2>/dev/null; then
              echo "FALHA: sudo NOPASSWD nao funciona para o usuario SSH: $DEPLOY_USER"
              echo "O secret EC2_USER no GitHub deve ser esse mesmo usuario."
              echo ""
              echo "No EC2 (SSH interativo, uma vez), rode na ordem:"
              echo "  sudo chown -R $DEPLOY_USER:$DEPLOY_USER $APP_DIR"
              echo "  git config --global --add safe.directory $APP_DIR"
              echo "  cd $APP_DIR && git pull origin main"
              echo "  bash $APP_DIR/deploy/bootstrap-ec2-deploy.sh"
              echo ""
              echo "Se ja instalou sudoers antes: o sed antigo (s/^ubuntu /) deixa"
              echo "Defaults:ubuntu errado. Reinstale com bootstrap ou:"
              echo "  sudo sed -i \"s/ubuntu/$DEPLOY_USER/g\" /etc/sudoers.d/bolao-deploy"
              echo "  sudo visudo -cf /etc/sudoers.d/bolao-deploy"
              if [ -f /etc/sudoers.d/bolao-deploy ]; then
                echo ""
                echo "Arquivo atual /etc/sudoers.d/bolao-deploy (primeiras linhas):"
                sudo sed -n '1,12p' /etc/sudoers.d/bolao-deploy 2>/dev/null || true
              fi
              exit 1
            fi

            echo "-> Garantindo permissao de escrita no repositorio..."
            if [ ! -w .git ] || { [ -e .git/FETCH_HEAD ] && [ ! -w .git/FETCH_HEAD ]; }; then
              echo "  .git sem escrita para $DEPLOY_USER - ajustando dono com sudo"
              if ! sudo -n chown -R "$DEPLOY_USER:$DEPLOY_USER" "$APP_DIR"; then
                echo "FALHA: chown NOPASSWD nao configurado ou negado."
                echo "No EC2 (sessao interativa): sudo chown -R $DEPLOY_USER:$DEPLOY_USER $APP_DIR"
                echo "Reinstale sudoers (inclui BOLAO_CHOWN): deploy/sudoers-bolao-deploy"
                exit 1
              fi
            fi

            echo "-> Atualizando codigo..."
            git -c "safe.directory=$APP_DIR" fetch origin main
            git -c "safe.directory=$APP_DIR" reset --hard origin/main

            echo "-> Preflight ferramentas..."
            command -v python3 >/dev/null || { echo "FALHA: python3 ausente"; exit 1; }

            if ! command -v npm >/dev/null; then
              echo "-> npm ausente - tentando nvm (sem sudo)..."
              export NVM_DIR="$HOME/.nvm"
              if [ ! -s "$NVM_DIR/nvm.sh" ]; then
                curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
              fi
              # shellcheck disable=SC1091
              . "$NVM_DIR/nvm.sh"
              nvm install 20
              nvm use 20
            fi
            command -v npm >/dev/null || {
              echo "FALHA: npm ausente. Instale Node no EC2 (RUNBOOK Deploy EC2) e rode o workflow de novo."
              exit 1
            }

            echo "-> Sincronizando unit systemd..."
            sudo -n cp "$APP_DIR/bolao.service" /etc/systemd/system/bolao.service
            sudo -n "$SYSTEMCTL" daemon-reload

            echo "-> Garantindo venv Python..."
            if ! "$PYTHON" -c "import sys" >/dev/null 2>&1; then
              echo "  venv ausente ou quebrado - recriando"
              rm -rf "$APP_DIR/.venv"
              python3 -m venv "$APP_DIR/.venv"
            fi
            "$PIP" install -r "$APP_DIR/requirements.txt"

            echo "-> Buildando frontend..."
            ( cd "$APP_DIR/frontend" && npm install && npm run build )

            echo "-> Rodando migrations..."
            "$PYTHON" -m alembic upgrade head

            echo "-> Reiniciando servico..."
            sudo -n "$SYSTEMCTL" restart bolao

            echo "-> Verificacao local pos-restart..."
            sleep 2
            systemctl is-active --quiet bolao || { echo "FALHA: bolao nao esta active"; exit 1; }

            echo "OK: Deploy concluido!"
