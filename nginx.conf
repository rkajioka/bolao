# nginx.conf — Bolão da Copa (produção)
# Coloque este arquivo em /etc/nginx/sites-available/bolao e crie o symlink:
#   sudo ln -s /etc/nginx/sites-available/bolao /etc/nginx/sites-enabled/bolao
#   sudo nginx -t && sudo systemctl reload nginx
#
# O front chama a API na raiz (/auth, /jogos, …). Equipe usa /api/equipe (só-API abaixo).
# Ao adicionar routers em app/routes/, atualize as locations abaixo e frontend/vite.config.ts.
#
# Prefixos sempre API: auth, usuarios, empresas, paises, palpites-jogos, palpites-especiais,
#   marcadores-brasil, configuracao-bolao, configuracao-pontuacao-fase, resultados-especiais,
#   plataforma, static, health
# Rotas SPA + API (Accept: application/json → API; navegação HTML → index.html):
#   perfil, jogos, ranking, grupos
# Equipe: fetch em /api/equipe (location /api/); navegação HTML em /equipe (SPA).

upstream bolao_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Rotas duplas (mesmo path no React Router e no FastAPI)
map $http_accept $wants_json {
    default 0;
    "~*application/json" 1;
}

map $request_method $dual_route_non_get {
    default 1;
    GET     0;
}

map "$dual_route_non_get:$wants_json" $proxy_dual_to_api {
    default 1;
    "0:0"   0;
    "0:1"   1;
}

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;  # substitua pelo domínio real em produção

    # --- TLS (ajuste os caminhos para os certificados reais) ----------------
    ssl_certificate     /etc/ssl/certs/bolao.crt;
    ssl_certificate_key /etc/ssl/private/bolao.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Segurança ----------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;

    # --- Gzip — reduz bundle JS/CSS/JSON em ~70% ----------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # --- Limita tamanho de upload (avatares) --------------------------------
    client_max_body_size 5M;

    # --- Frontend estático (SPA) --------------------------------------------
    root /var/www/bolao/frontend/dist;
    index index.html;

    # --- Bloqueia acesso a arquivos ocultos ---------------------------------
    location ~ /\. {
        deny all;
    }

    # Serve arquivos estáticos do build Vite (hash no nome → cache longo)
    location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML e manifests do front — sem cache agressivo
    location ~* \.(html|json)$ {
        expires -1;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # --- Healthcheck (sem logs) ---------------------------------------------
    location = /health {
        access_log off;
        proxy_pass http://bolao_api/health;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;
        proxy_set_header   Accept-Encoding   "";
    }

    # Bandeiras e uploads de avatar (FastAPI /static)
    location ^~ /static/ {
        proxy_pass http://bolao_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;
        proxy_set_header   Accept-Encoding   "";
    }

    # Prefixos só-API (sem colisão com rotas do React Router)
    location ~ ^/(auth|usuarios|empresas|paises|palpites-jogos|palpites-especiais|marcadores-brasil|configuracao-bolao|configuracao-pontuacao-fase|resultados-especiais|plataforma)(/|$) {
        proxy_pass http://bolao_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;
        proxy_set_header   Accept-Encoding   "";
    }

    # SPA /equipe (React Router); API de equipe via /api/equipe
    location ~ ^/equipe(/|$) {
        try_files $uri /index.html;
    }

    # Rotas duplas: fetch JSON → API; F5 no browser → SPA
    location ~ ^/(perfil|jogos|ranking|grupos)(/|$) {
        error_page 418 = @bolao_api;
        if ($proxy_dual_to_api) {
            return 418;
        }
        try_files $uri /index.html;
    }

    location @bolao_api {
        proxy_pass         http://bolao_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;
        proxy_set_header   Accept-Encoding   "";
    }

    # Compatibilidade com clientes que ainda usam prefixo /api/
    location /api/ {
        proxy_pass         http://bolao_api/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;
        proxy_set_header   Accept-Encoding   "";
    }

    # SPA fallback — login, admin, ativar-conta, etc. (sempre por último)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
