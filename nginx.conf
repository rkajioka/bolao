# nginx.conf — Bolão da Copa (produção)
# Coloque este arquivo em /etc/nginx/sites-available/bolao e crie o symlink:
#   sudo ln -s /etc/nginx/sites-available/bolao /etc/nginx/sites-enabled/bolao
#   sudo nginx -t && sudo systemctl reload nginx

upstream bolao_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;  # substitua pelo domínio real em produção

    # --- TLS (ajuste os caminhos para os certificados reais) ----------------
    ssl_certificate     /etc/ssl/certs/bolao.crt;
    ssl_certificate_key /etc/ssl/private/bolao.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Segurança ----------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;

    # --- Gzip — reduz bundle JS/CSS/JSON em ~70% ----------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;          # equilíbrio CPU × tamanho (1–9)
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   1024;       # não comprime respostas muito pequenas
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # --- Frontend estático (SPA) --------------------------------------------
    root /var/www/bolao/frontend/dist;
    index index.html;

    # Serve arquivos estáticos com cache longo (hash no nome garante invalidação)
    location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML e manifests nunca ficam em cache para SPA funcionar corretamente
    location ~* \.(html|json)$ {
        expires -1;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # SPA fallback — qualquer rota desconhecida entrega o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API Backend --------------------------------------------------------
    location /api/ {
        proxy_pass         http://bolao_api/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";   # keepalive com upstream
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts generosos para endpoints de ranking/insights
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;

        # Não comprime novamente se o upstream já devolveu gzip
        proxy_set_header   Accept-Encoding   "";
    }

    # --- Healthcheck (sem logs) ---------------------------------------------
    location = /health {
        proxy_pass http://bolao_api/health;
        access_log off;
    }

    # --- Limita tamanho de upload (avatares) --------------------------------
    client_max_body_size 5M;

    # --- Bloqueia acesso a arquivos ocultos ---------------------------------
    location ~ /\. {
        deny all;
    }
}
